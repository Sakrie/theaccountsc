<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accounts Manager</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<!-- تسجيل -->
<div id="authBox">
  <h2>تسجيل الدخول</h2>
  <input id="username" placeholder="اسم المستخدم">
  <input id="password" type="password" placeholder="كلمة المرور">
  <button onclick="login()">دخول</button>
  <button onclick="signup()">إنشاء حساب</button>
</div>

<!-- التطبيق -->
<div id="appBox" style="display:none;">

<header>
<h1>📊 نظام إدارة الحسابات</h1>
<button onclick="logout()">تسجيل خروج</button>
</header>

<section class="dashboard">
<div class="card">داخل: <span id="insideTotal">0</span></div>
<div class="card">خارج: <span id="outsideTotal">0</span></div>
<div class="card">بطاقات: <span id="cardsTotal">0</span></div>
</section>

<section>
<input id="name" placeholder="اسم المندوب">
<select id="type">
<option value="inside">داخل</option>
<option value="outside">خارج</option>
</select>
<button onclick="addAgent()">إضافة</button>
</section>

<input id="search" oninput="searchAgent()" placeholder="بحث">

<ul id="agentsList"></ul>

<button onclick="resetAll()">تصفير الكل</button>

<hr>

<h3>📅 التقارير</h3>

من:
<input type="date" id="fromDate">
إلى:
<input type="date" id="toDate">

<button onclick="generateReport()">عرض التقرير</button>
<button onclick="exportPDF()">PDF</button>

<div id="reportBox"></div>

</div>

<!-- مودال -->
<div id="modal" class="hidden">
<div class="modalBox">

<h3 id="modalTitle"></h3>

<button onclick="chooseType('cards')">بطاقات</button>
<button onclick="chooseType('money')">مبلغ</button>
<button onclick="chooseType('tip')">إكرامية</button>
<button onclick="chooseType('debt')">سلفة</button>

<input id="valueInput" type="number" placeholder="القيمة">

<button onclick="saveTransaction()">حفظ</button>
<button onclick="closeModal()">إغلاق</button>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
